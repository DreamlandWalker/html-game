<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>征程地图 · 选关</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0b0d17;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;padding:20px;display:flex;justify-content:center;align-items:center}

.map-container{width:960px;max-width:100%;background:linear-gradient(145deg,#14182a,#1a1f35);border-radius:32px;padding:28px 26px 32px;box-shadow:0 20px 60px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.05);position:relative}
.map-container::before{content:'';position:absolute;inset:0;border-radius:32px;background:radial-gradient(ellipse at 20% 80%,rgba(98,114,255,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(255,215,128,.04) 0%,transparent 50%);pointer-events:none}

/* Header */
.map-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;position:relative;z-index:2}
.map-header h1{font-size:26px;font-weight:800;letter-spacing:3px;background:linear-gradient(135deg,#f0e6d0,#c9b38c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.map-header .header-links{display:flex;gap:8px}
.map-header .header-links a{padding:7px 16px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;transition:all .2s;cursor:pointer;font-family:inherit}
.map-header .header-links a:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
.camp-btn{border-color:rgba(255,215,128,.3)!important;color:#ffd780!important;background:rgba(255,215,128,.06)!important}
.camp-btn:hover{border-color:#ffd780!important;background:rgba(255,215,128,.12)!important}

/* Player Bar */
.player-bar{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:8px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.12);position:relative;z-index:2}
.player-bar .pb-avatar{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,215,128,.15);overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);flex-shrink:0}
.player-bar .pb-avatar img{width:26px;height:26px;object-fit:none;image-rendering:pixelated}
.player-bar .pb-info{flex:1;min-width:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.player-bar .pb-name{font-size:13px;font-weight:700;color:#e8ddce}
.player-bar .pb-stat{font-size:11px;color:rgba(255,255,255,.4)}
.player-bar .pb-stat strong{color:#ffd780}

/* Level Grid */
.level-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;position:relative;z-index:2;margin-bottom:8px}
@media(max-width:680px){.level-grid{grid-template-columns:repeat(5,1fr);gap:6px}}
@media(max-width:420px){.level-grid{grid-template-columns:repeat(4,1fr);gap:4px}}

.level-cell{aspect-ratio:1;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;min-height:68px}
.level-cell:hover{transform:translateY(-3px)}

/* locked */
.level-cell.locked{border-color:rgba(255,255,255,.04);background:rgba(0,0,0,.2);cursor:not-allowed;filter:grayscale(.5)}
.level-cell.locked:hover{transform:none}
.level-cell.locked .lc-num{color:rgba(255,255,255,.08);font-size:22px;font-weight:700}
.level-cell.locked .lc-lock{font-size:16px;opacity:.25;position:absolute}

/* unlocked */
.level-cell.unlocked{border-color:rgba(255,215,128,.25);background:rgba(255,215,128,.04)}
.level-cell.unlocked:hover{border-color:rgba(255,215,128,.5);background:rgba(255,215,128,.08);box-shadow:0 4px 16px rgba(255,215,128,.08)}
.level-cell.unlocked .lc-num{font-size:22px;font-weight:700;color:rgba(255,215,128,.7)}
.level-cell.unlocked .lc-label{font-size:9px;color:rgba(255,255,255,.3);margin-top:1px;text-align:center;line-height:1.2}

/* completed */
.level-cell.completed{border-color:#ffd780;background:linear-gradient(135deg,rgba(255,215,128,.12),rgba(255,215,128,.04))}
.level-cell.completed:hover{border-color:#ffd780;background:linear-gradient(135deg,rgba(255,215,128,.18),rgba(255,215,128,.08));box-shadow:0 4px 20px rgba(255,215,128,.12)}
.level-cell.completed .lc-num{font-size:20px;font-weight:700;color:#ffd780}
.level-cell.completed .lc-label{font-size:8px;color:rgba(255,215,128,.5);margin-top:1px}
.level-cell.completed .lc-check{position:absolute;top:2px;right:4px;font-size:12px}

/* boss indicator */
.level-cell.has-boss::after{content:'👑';position:absolute;top:2px;left:4px;font-size:12px;filter:drop-shadow(0 0 4px rgba(255,215,128,.5))}
.level-cell.completed.has-boss::after{content:'👑';filter:drop-shadow(0 0 4px rgba(255,215,128,.3))}

/* current indicator */
.level-cell.current{border-color:#ffd780!important;box-shadow:0 0 16px rgba(255,215,128,.2),inset 0 0 12px rgba(255,215,128,.05)!important}
.level-cell.current .lc-num{color:#ffd780!important;text-shadow:0 0 8px rgba(255,215,128,.3)}
.level-cell.current .lc-label{color:rgba(255,215,128,.7)!important}

/* score badge */
.lc-score{position:absolute;bottom:3px;right:4px;font-size:8px;color:rgba(255,215,128,.4);font-weight:600}

/* Progress bar */
.progress-bar{height:4px;border-radius:3px;background:rgba(255,255,255,.04);overflow:hidden;margin-top:10px;position:relative;z-index:2}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ffd780,#f0b84d);transition:width .5s ease}

.progress-text{position:relative;z-index:2;text-align:center;font-size:11px;color:rgba(255,255,255,.2);margin-top:4px;letter-spacing:1px}

/* Legend */
.legend{display:flex;gap:14px;margin-top:10px;justify-content:center;position:relative;z-index:2;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:rgba(255,255,255,.2)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1f35;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 28px;max-width:380px;width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6);text-align:center}
.modal-box .mb-icon{font-size:36px;display:block;margin-bottom:6px}
.modal-box .mb-text{font-size:14px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:14px}
.modal-box .mb-btn{padding:8px 28px;border:1px solid rgba(255,215,128,.3);border-radius:10px;background:rgba(255,215,128,.1);color:#ffd780;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;font-weight:600}
.modal-box .mb-btn:hover{background:rgba(255,215,128,.2);border-color:#ffd780}
</style>
</head>
<body>

<div class="map-container">
  <div class="map-header">
    <h1>🗺 征程地图</h1>
    <div class="header-links">
      <a href="camp.html" class="camp-btn">🏕️ 营地</a>
      <a href="character.html">📋 角色</a>
      <a href="index.html">← 选人</a>
    </div>
  </div>

  <div class="player-bar">
    <div class="pb-avatar"><img src="images/character/face/warrior-male.png" alt="" id="mapAvatar"></div>
    <div class="pb-info">
      <span class="pb-name" id="mapName">战士 ♂</span>
      <span class="pb-stat">Lv.<strong id="mapLevel">1</strong></span>
      <span class="pb-stat">💰 <strong id="mapGold">100</strong></span>
      <span class="pb-stat">已通关 <strong id="mapCleared">0</strong>/40</span>
    </div>
  </div>

  <div class="level-grid" id="levelGrid"></div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 40</div>

  <div class="legend">
    <span class="legend-item">🔒 未解锁</span>
    <span class="legend-item">⭐ 可挑战</span>
    <span class="legend-item">✅ 已通关</span>
    <span class="legend-item">👑 BOSS关</span>
  </div>
</div>

<!-- Alert Modal -->
<div class="modal-overlay" id="alertModal">
  <div class="modal-box">
    <span class="mb-icon" id="alertIcon">🔒</span>
    <div class="mb-text" id="alertText">请先通关前一关</div>
    <button class="mb-btn" onclick="closeAlert()">知道了</button>
  </div>
</div>

<script>
const LEVEL_COUNT = 40;

const LEVEL_NAMES = [
  '初阵森林','密林小径','古堡回廊','冰原雪道','火山洞穴',
  '深渊遗迹','圣殿回廊','冥河渡口','云巅前哨','石林迷阵',
  '暗影沼泽','龙骨荒原','风暴之眼','水晶洞穴','遗忘废墟',
  '时光回廊','星穹之巅','混沌之门','语法·初','语法·中',
  '语法·终','决战平原','英灵殿','月影森林','晨曦山谷',
  '翠微湖畔','清风岗','铁壁关','凌云渡','语法·极',
  '初阵·贰','成长·贰','历练·贰','蜕变·贰','归元·壹',
  '归元·贰','归元·叁','归元·肆','归元·伍','终焉之巅'
];

function getData(){
  try{return JSON.parse(localStorage.getItem('hanako_game_data'))||{};}catch(e){return {};}
}
function saveData(d){localStorage.setItem('hanako_game_data',JSON.stringify(d));}

const nameMap={warrior:'战士',mage:'法师',priest:'牧师',archer:'弓箭手'};
const genderMap={male:'♂',female:'♀'};

const data = getData();
const levels = data.levels || {};
let currentLevel = data.currentLevel || 1;

// ─── 初始化 ───
function init(){
  const cls = data.selectedClass||'warrior', gen = data.selectedGender||'male';
  document.getElementById('mapAvatar').src = 'images/character/face/'+cls+'-'+gen+'.png';
  document.getElementById('mapName').textContent = (nameMap[cls]||'战士')+' '+(genderMap[gen]||'♂');
  const ch = data.character||{};
  document.getElementById('mapLevel').textContent = ch.level||1;
  document.getElementById('mapGold').textContent = ch.gold||0;

  const cleared = Object.values(levels).filter(v=>v.completed).length;
  document.getElementById('mapCleared').textContent = cleared;

  renderGrid();
  updateProgress(cleared);
}

function updateProgress(cleared){
  const pct = (cleared / LEVEL_COUNT) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = cleared + ' / ' + LEVEL_COUNT;
}

// ─── 渲染网格 ───
function renderGrid(){
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';

  const cleared = Object.values(levels).filter(v=>v.completed).length;

  for(let i = 1; i <= LEVEL_COUNT; i++){
    const cell = document.createElement('div');
    cell.className = 'level-cell';
    cell.dataset.level = i;

    const lvlState = levels[i];
    const completed = lvlState && lvlState.completed;
    const unlocked = i <= currentLevel;
    const isCurrent = i === currentLevel;

    if(completed){
      cell.classList.add('completed');
    } else if(unlocked){
      cell.classList.add('unlocked');
    } else {
      cell.classList.add('locked');
    }

    if(isCurrent && !completed){
      cell.classList.add('current');
    }

    // Every level has a boss (from the generator)
    cell.classList.add('has-boss');

    const score = lvlState && lvlState.score ? lvlState.score : 0;

    cell.innerHTML = `
      <span class="lc-num">${i}</span>
      <span class="lc-label">${LEVEL_NAMES[i-1]}</span>
      ${completed ? '<span class="lc-check">✅</span>' : (!unlocked ? '<span class="lc-lock">🔒</span>' : '')}
      ${score > 0 ? `<span class="lc-score">${score}</span>` : ''}
    `;

    cell.addEventListener('click', () => handleLevelClick(i));
    grid.appendChild(cell);
  }
}

function handleLevelClick(levelId){
  const lvlState = levels[levelId];
  const completed = lvlState && lvlState.completed;

  if(levelId > currentLevel && !completed){
    showAlert('🔒', '请先通关第 '+(levelId-1)+' 关');
    return;
  }

  window.location.href = 'game.html?level='+levelId;
}

// ─── Alert ───
function showAlert(icon, text){
  document.getElementById('alertIcon').textContent = icon;
  document.getElementById('alertText').textContent = text;
  document.getElementById('alertModal').classList.add('show');
}

function closeAlert(){
  document.getElementById('alertModal').classList.remove('show');
}

// ─── Keyboard shortcut ───
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closeAlert();
  if(e.key === 'c' || e.key === 'C') window.location.href = 'camp.html';
});

// ─── Init ───
init();
</script>
</body>
</html>
