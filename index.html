<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英雄殿堂 · 角色选择</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0d17;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 20px;
    }

    .game-container {
      width: 960px;
      max-width: 100%;
      background: linear-gradient(145deg, #14182a 0%, #1a1f35 100%);
      border-radius: 32px;
      padding: 40px 36px 48px;
      box-shadow:
        0 20px 60px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
    }

    .game-container::before {
      content: '';
      position: absolute;
      top: -120px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 300px;
      background: radial-gradient(ellipse, rgba(98,114,255,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .pixel-art {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
      z-index: 1;
    }
    .header h1 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #f0e6d0 0%, #c9b38c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(201,179,140,.3);
    }
    .header .subtitle {
      color: rgba(255,255,255,.35);
      font-size: 14px;
      letter-spacing: 6px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .char-card {
      background: linear-gradient(180deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.01) 100%);
      border-radius: 18px;
      padding: 20px 14px 18px;
      text-align: center;
      cursor: pointer;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      border: 1px solid rgba(255,255,255,.06);
      user-select: none;
      position: relative;
    }
    .char-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.15);
      background: linear-gradient(180deg, rgba(255,255,255,.07) 0%, rgba(255,255,255,.02) 100%);
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
    }

    .char-card.selected {
      border-color: #ffd780;
      background: linear-gradient(180deg, rgba(255,215,128,.12) 0%, rgba(255,215,128,.04) 100%);
      box-shadow:
        0 0 20px rgba(255,215,128,.15),
        inset 0 0 20px rgba(255,215,128,.05);
      transform: translateY(-4px);
    }

    .char-card.selected .check-mark {
      opacity: 1;
      transform: scale(1);
    }

    .check-mark {
      position: absolute;
      top: 10px; right: 10px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd780, #f0b84d);
      color: #1a1f35;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(.5);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 2;
    }

    .char-portrait {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.06);
      position: relative;
      overflow: hidden;
    }
    .char-portrait img {
      width: 64px;
      height: 64px;
      object-fit: none;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .char-card.selected .char-portrait {
      border-color: rgba(255,215,128,.3);
      background: rgba(255,215,128,.08);
    }

    .char-name {
      font-size: 20px;
      font-weight: 700;
      color: #e8ddce;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .char-class {
      font-size: 12px;
      color: rgba(255,255,255,.3);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .gender-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
    }
    .gender-btn {
      padding: 3px 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.35);
      font-size: 12px;
      cursor: pointer;
      transition: all .2s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }
    .gender-btn:hover {
      border-color: rgba(255,255,255,.25);
      color: rgba(255,255,255,.6);
      background: rgba(255,255,255,.06);
    }
    .gender-btn.active-male {
      border-color: #6ca0ff;
      color: #8ab8ff;
      background: rgba(108,160,255,.1);
    }
    .gender-btn.active-female {
      border-color: #f0a0c0;
      color: #f5b8d0;
      background: rgba(240,160,192,.1);
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 4px;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: rgba(255,255,255,.45);
    }
    .stat-row .label {
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }
    .stat-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .stat-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width .4s ease;
    }
    .stat-bar .fill.str  { background: linear-gradient(90deg, #e06c6c, #ff8a8a); }
    .stat-bar .fill.int  { background: linear-gradient(90deg, #6ca0ff, #8ab8ff); }
    .stat-bar .fill.agi  { background: linear-gradient(90deg, #6cdb6c, #8aff8a); }
    .stat-bar .fill.spr  { background: linear-gradient(90deg, #c084f0, #d8a0ff); }

    .char-desc {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      line-height: 1.6;
      margin-top: 8px;
      min-height: 38px;
      opacity: 0;
      transition: opacity .3s ease;
    }
    .char-card.selected .char-desc,
    .char-card:hover .char-desc {
      opacity: 1;
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .info-text {
      color: rgba(255,255,255,.3);
      font-size: 14px;
    }
    .info-text strong {
      color: #ffd780;
      font-weight: 600;
    }
    .info-text .gender-tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    .info-text .gender-tag.male {
      color: #8ab8ff;
      background: rgba(108,160,255,.12);
    }
    .info-text .gender-tag.female {
      color: #f5b8d0;
      background: rgba(240,160,192,.12);
    }

    .btn-start {
      padding: 12px 44px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1a1f35;
      background: linear-gradient(135deg, #ffd780, #f0b84d);
      cursor: pointer;
      transition: all .25s ease;
      box-shadow: 0 4px 20px rgba(255,215,128,.25);
      position: relative;
      overflow: hidden;
    }
    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.3) 100%);
      pointer-events: none;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,215,128,.35);
    }
    .btn-start:active {
      transform: translateY(0);
    }
    .btn-start:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    @media (max-width: 780px) {
      .char-grid { grid-template-columns: repeat(2, 1fr); }
      .game-container { padding: 28px 18px 32px; }
      .header h1 { font-size: 28px; }
    }
    @media (max-width: 420px) {
      .char-grid { grid-template-columns: 1fr; }
      .bottom-bar { flex-direction: column; gap: 16px; }
    }
  </style>
</head>
<body>

<div class="game-container">

  <div class="header">
    <h1>⚔ 英雄殿堂</h1>
    <div class="subtitle">Choose Your Champion</div>
  </div>

  <div class="char-grid" id="charGrid">

    <!-- 战士 -->
    <div class="char-card" data-class="warrior">
      <span class="check-mark">✓</span>
      <div class="char-portrait">
        <img src="images/character/face/warrior-male.png" alt="战士" data-gender="male" class="pixel-art">
      </div>
      <div class="char-name">战士</div>
      <div class="char-class">Warrior</div>
      <div class="gender-toggle">
        <button class="gender-btn active-male" data-gender="male">♂ 男</button>
        <button class="gender-btn" data-gender="female">♀ 女</button>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="label">力量</span><div class="stat-bar"><div class="fill str" style="width:90%"></div></div></div>
        <div class="stat-row"><span class="label">智力</span><div class="stat-bar"><div class="fill int" style="width:30%"></div></div></div>
        <div class="stat-row"><span class="label">敏捷</span><div class="stat-bar"><div class="fill agi" style="width:40%"></div></div></div>
        <div class="stat-row"><span class="label">精神</span><div class="stat-bar"><div class="fill spr" style="width:35%"></div></div></div>
      </div>
      <div class="char-desc">钢铁壁垒，不屈之盾，冲锋在前。</div>
    </div>

    <!-- 法师 -->
    <div class="char-card" data-class="mage">
      <span class="check-mark">✓</span>
      <div class="char-portrait">
        <img src="images/character/face/mage-male.png" alt="法师" data-gender="male" class="pixel-art">
      </div>
      <div class="char-name">法师</div>
      <div class="char-class">Mage</div>
      <div class="gender-toggle">
        <button class="gender-btn active-male" data-gender="male">♂ 男</button>
        <button class="gender-btn" data-gender="female">♀ 女</button>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="label">力量</span><div class="stat-bar"><div class="fill str" style="width:20%"></div></div></div>
        <div class="stat-row"><span class="label">智力</span><div class="stat-bar"><div class="fill int" style="width:95%"></div></div></div>
        <div class="stat-row"><span class="label">敏捷</span><div class="stat-bar"><div class="fill agi" style="width:35%"></div></div></div>
        <div class="stat-row"><span class="label">精神</span><div class="stat-bar"><div class="fill spr" style="width:60%"></div></div></div>
      </div>
      <div class="char-desc">元素主宰，毁天灭地，脆弱但致命。</div>
    </div>

    <!-- 牧师 -->
    <div class="char-card" data-class="priest">
      <span class="check-mark">✓</span>
      <div class="char-portrait">
        <img src="images/character/face/priest-male.png" alt="牧师" data-gender="male" class="pixel-art">
      </div>
      <div class="char-name">牧师</div>
      <div class="char-class">Priest</div>
      <div class="gender-toggle">
        <button class="gender-btn active-male" data-gender="male">♂ 男</button>
        <button class="gender-btn" data-gender="female">♀ 女</button>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="label">力量</span><div class="stat-bar"><div class="fill str" style="width:25%"></div></div></div>
        <div class="stat-row"><span class="label">智力</span><div class="stat-bar"><div class="fill int" style="width:55%"></div></div></div>
        <div class="stat-row"><span class="label">敏捷</span><div class="stat-bar"><div class="fill agi" style="width:30%"></div></div></div>
        <div class="stat-row"><span class="label">精神</span><div class="stat-bar"><div class="fill spr" style="width:95%"></div></div></div>
      </div>
      <div class="char-desc">圣光庇佑，救死扶伤，团队之魂。</div>
    </div>

    <!-- 弓箭手 -->
    <div class="char-card" data-class="archer">
      <span class="check-mark">✓</span>
      <div class="char-portrait">
        <img src="images/character/face/archer-male.png" alt="弓箭手" data-gender="male" class="pixel-art">
      </div>
      <div class="char-name">弓箭手</div>
      <div class="char-class">Archer</div>
      <div class="gender-toggle">
        <button class="gender-btn active-male" data-gender="male">♂ 男</button>
        <button class="gender-btn" data-gender="female">♀ 女</button>
      </div>
      <div class="stats">
        <div class="stat-row"><span class="label">力量</span><div class="stat-bar"><div class="fill str" style="width:40%"></div></div></div>
        <div class="stat-row"><span class="label">智力</span><div class="stat-bar"><div class="fill int" style="width:25%"></div></div></div>
        <div class="stat-row"><span class="label">敏捷</span><div class="stat-bar"><div class="fill agi" style="width:95%"></div></div></div>
        <div class="stat-row"><span class="label">精神</span><div class="stat-bar"><div class="fill spr" style="width:45%"></div></div></div>
      </div>
      <div class="char-desc">百步穿杨，游走如风，千里索敌。</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="info-text">
      已选择：<strong id="selectedName">无</strong>
      <span class="gender-tag" id="selectedGender"></span>
    </div>
    <button class="btn-start" id="btnStart" disabled>开始冒险</button>
  </div>

</div>

<script>
// ─── 背景音乐 ───
(function(){var a=document.createElement('audio');a.id='_bgm';a.loop=true;a.src='sounds/main_background_music.mp3';a.volume=0.12;a.play().catch(function(){})})();

  // ── 基础属性表（职业 × 性别）──
  const statTable = {
    warrior: {
      male:  { str: 90, int: 30, agi: 40, spr: 35 },
      female: { str: 75, int: 35, agi: 60, spr: 45 }
    },
    mage: {
      male:  { str: 20, int: 95, agi: 35, spr: 60 },
      female: { str: 15, int: 80, agi: 40, spr: 85 }
    },
    priest: {
      male:  { str: 35, int: 55, agi: 30, spr: 90 },
      female: { str: 20, int: 60, agi: 35, spr: 95 }
    },
    archer: {
      male:  { str: 50, int: 25, agi: 95, spr: 35 },
      female: { str: 35, int: 30, agi: 90, spr: 55 }
    }
  };

  const statLabels = { str: '力量', int: '智力', agi: '敏捷', spr: '精神' };
  const statClasses = { str: 'str', int: 'int', agi: 'agi', spr: 'spr' };
  const genderMap = { male: '男性', female: '女性' };

  const cards = document.querySelectorAll('.char-card');
  const btnStart = document.getElementById('btnStart');
  const selectedName = document.getElementById('selectedName');
  const selectedGender = document.getElementById('selectedGender');
  let currentSelected = null;

  function updateStats(card, gender) {
    const cls = card.dataset.class;
    const stats = statTable[cls][gender];
    const statRows = card.querySelectorAll('.stat-row');
    statRows.forEach(row => {
      const label = row.querySelector('.label').textContent;
      // map Chinese label to key
      const key = Object.keys(statLabels).find(k => statLabels[k] === label);
      if (key && stats[key] !== undefined) {
        const fill = row.querySelector('.fill');
        fill.style.width = stats[key] + '%';
      }
    });
  }

  function selectCard(card) {
    if (currentSelected) {
      currentSelected.classList.remove('selected');
    }
    card.classList.add('selected');
    currentSelected = card;
    btnStart.disabled = false;

    const name = card.querySelector('.char-name').textContent;
    const img = card.querySelector('.char-portrait img');
    const gender = img.dataset.gender;
    selectedName.textContent = name;
    selectedGender.textContent = genderMap[gender] || '';
    selectedGender.className = 'gender-tag ' + gender;
  }

  function switchGender(card, gender) {
    const cls = card.dataset.class;
    const img = card.querySelector('.char-portrait img');
    const btns = card.querySelectorAll('.gender-btn');

    // Update image
    img.src = `images/character/face/${cls}-${gender}.png`;
    img.dataset.gender = gender;

    // Update button states
    btns.forEach(btn => {
      btn.classList.remove('active-male', 'active-female');
      if (btn.dataset.gender === gender) {
        btn.classList.add(gender === 'male' ? 'active-male' : 'active-female');
      }
    });

    // Update stat bars
    updateStats(card, gender);

    // Update bottom bar if selected
    if (card === currentSelected) {
      const name = card.querySelector('.char-name').textContent;
      selectedName.textContent = name;
      selectedGender.textContent = genderMap[gender];
      selectedGender.className = 'gender-tag ' + gender;
    }
  }

  // Init stats for default male
  cards.forEach(card => {
    updateStats(card, 'male');
  });

  cards.forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.gender-btn')) return;
      selectCard(card);
    });

    const btns = card.querySelectorAll('.gender-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const gender = btn.dataset.gender;
        switchGender(card, gender);
        selectCard(card);
      });
    });
  });

  // ── 各职业默认装备 ──
  const defaultEquipment = {
    warrior: {
      weapon: { id: 'iron_sword', name: '铁剑', icon: '⚔️', desc: '战士的新手武器', slot: 'weapon', stats: { str: 8, agi: 5 } },
      chest:  { id: 'iron_armor', name: '铁甲', icon: '🛡️', desc: '厚重的铁制胸甲', slot: 'chest', stats: { str: 12, hp: 30 } },
      legs:   { id: 'iron_greaves', name: '铁护腿', icon: '👖', desc: '坚固的铁护腿', slot: 'legs', stats: { str: 6, hp: 20 } },
      shoes:  { id: 'iron_boots', name: '铁靴', icon: '🥾', desc: '沉重的铁靴', slot: 'shoes', stats: { str: 4, agi: 5 } }
    },
    mage: {
      weapon: { id: 'staff', name: '法杖', icon: '🔮', desc: '学徒法杖', slot: 'weapon', stats: { int: 10, spr: 5 } },
      chest:  { id: 'robe', name: '法袍', icon: '👕', desc: '附魔法袍', slot: 'chest', stats: { int: 8, mp: 25 } },
      legs:   { id: 'mage_pants', name: '法裤', icon: '👖', desc: '符文编织长裤', slot: 'legs', stats: { int: 5, mp: 15 } },
      shoes:  { id: 'cloth_boots', name: '布靴', icon: '🥾', desc: '轻便布靴', slot: 'shoes', stats: { int: 3, spr: 4 } }
    },
    priest: {
      weapon: { id: 'tome', name: '圣典', icon: '📖', desc: '光明圣典', slot: 'weapon', stats: { spr: 8, int: 6 } },
      chest:  { id: 'vestment', name: '祭袍', icon: '👕', desc: '神圣祭袍', slot: 'chest', stats: { spr: 10, hp: 25 } },
      legs:   { id: 'holy_leggings', name: '祭裤', icon: '👖', desc: '祈祷长裤', slot: 'legs', stats: { spr: 5, int: 4 } },
      shoes:  { id: 'cloth_sandals', name: '布靴', icon: '🥾', desc: '修行布靴', slot: 'shoes', stats: { spr: 4, agi: 3 } }
    },
    archer: {
      weapon: { id: 'short_bow', name: '短弓', icon: '🏹', desc: '猎弓', slot: 'weapon', stats: { agi: 9, str: 4 } },
      chest:  { id: 'leather_armor', name: '皮甲', icon: '🛡️', desc: '轻便皮甲', slot: 'chest', stats: { agi: 10, hp: 20 } },
      legs:   { id: 'leather_leggings', name: '皮裤', icon: '👖', desc: '灵活皮裤', slot: 'legs', stats: { agi: 5, str: 4 } },
      shoes:  { id: 'leather_boots', name: '皮靴', icon: '🥾', desc: '猎人之靴', slot: 'shoes', stats: { agi: 6, spr: 3 } }
    }
  };

  btnStart.addEventListener('click', () => {
    if (!currentSelected) return;
    const cls = currentSelected.dataset.class;
    const img = currentSelected.querySelector('.char-portrait img');
    const gender = img.dataset.gender;

    // ── 各职业默认背包药水 ──
    const defaultInventory = {
      warrior: [
        { id: 'hp_potion', name: '生命药水', icon: '🧪', desc: '恢复 80 点生命值', qty: 6, sellPrice: 10 }
      ],
      mage: [
        { id: 'hp_potion', name: '生命药水', icon: '🧪', desc: '恢复 80 点生命值', qty: 2, sellPrice: 10 },
        { id: 'mp_potion', name: '法力药水', icon: '💧', desc: '恢复 40 点法力值', qty: 5, sellPrice: 7 }
      ],
      priest: [
        { id: 'hp_potion', name: '生命药水', icon: '🧪', desc: '恢复 80 点生命值', qty: 3, sellPrice: 10 },
        { id: 'mp_potion', name: '法力药水', icon: '💧', desc: '恢复 40 点法力值', qty: 4, sellPrice: 7 }
      ],
      archer: [
        { id: 'hp_potion', name: '生命药水', icon: '🧪', desc: '恢复 80 点生命值', qty: 3, sellPrice: 10 },
        { id: 'mp_potion', name: '法力药水', icon: '💧', desc: '恢复 40 点法力值', qty: 3, sellPrice: 7 }
      ]
    };

    const data = {
      selectedClass: cls,
      selectedGender: gender,
      currentLevel: 1,
      levels: {},
      character: { level: 1, xp: 0, xpMax: 200, hp: 100, hpMax: 100, mp: 50, mpMax: 50, gold: 100 },
      inventory: []
    };

    try {
      const existing = localStorage.getItem('hanako_game_data');
      if (existing) {
        const parsed = JSON.parse(existing);
        data.currentLevel = parsed.currentLevel || 1;
        data.levels = parsed.levels || {};
        // 保留已有的角色成长数据
        if (parsed.character) data.character = parsed.character;
        if (parsed.inventory && parsed.inventory.length > 0) data.inventory = parsed.inventory;
      }
      // 如果背包为空（新角色或旧存档无物品），发放默认药水
      if (!data.inventory || data.inventory.length === 0) {
        data.inventory = defaultInventory[cls] || [];
      }

      // 更新职业和性别
      data.selectedClass = cls;
      data.selectedGender = gender;

      // 初始化技能
      const classSkillIds=[cls+'_1',cls+'_2',cls+'_3'];
      data.learnedSkills=classSkillIds;
      data.equippedSkills=[...classSkillIds,null];
      // 换职业时重置被动，同职业保留
      if(existing){
        try{
          const prev=JSON.parse(existing);
          if(prev.selectedClass===cls){
            data.learnedPassives=prev.learnedPassives||[];
            data.equippedPassive=prev.equippedPassive||null;
            data.passiveSlotUnlocked=prev.passiveSlotUnlocked||false;
          }
        }catch(e){}
      }

      // 换职业时重置装备，保留其他槽位已有的物品
      const eq = defaultEquipment[cls];
      data.equipment = {};
      for (const slot in eq) {
        data.equipment[slot] = { ...eq[slot] };
      }
      // 如果从 localStorage 读到已有装备且没换职业则保留（但上面换职业就重置了）
      if (existing) {
        const parsed = JSON.parse(existing);
        if (parsed.equipment && parsed.selectedClass === cls) {
          // 保留所有已有装备（含非默认槽位）
          data.equipment = { ...data.equipment, ...parsed.equipment };
        }
      }

      localStorage.setItem('hanako_game_data', JSON.stringify(data));
    } catch(e) {}

    window.location.href = 'main_map.html';
  });
</script>
</body>
</html>
