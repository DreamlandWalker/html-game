<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>营地</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0b0d17;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}
.camp-wrap{width:1024px;max-width:100%;background:linear-gradient(145deg,#14182a,#1a1f35);border-radius:32px;padding:28px 30px 32px;box-shadow:0 20px 60px rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.05)}

.camp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.camp-header h2{font-size:22px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#f0e6d0,#c9b38c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.camp-header .camp-links a{padding:7px 16px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;text-decoration:none;transition:all .2s}
.camp-header .camp-links a:hover{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}

.camp-status{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:10px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.04);background:rgba(0,0,0,.12)}
.camp-status .cs-avatar{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,215,128,.15);overflow:hidden;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);flex-shrink:0}
.camp-status .cs-avatar img{width:28px;height:28px;object-fit:none;image-rendering:pixelated}
.camp-status .cs-info{flex:1;min-width:0;display:flex;align-items:center;gap:12px}
.camp-status .cs-name{font-size:14px;font-weight:700;color:#e8ddce}
.camp-status .cs-stat{font-size:11px;color:rgba(255,255,255,.4)}
.camp-status .cs-stat strong{color:#ffd780}

.camp-tabs{display:flex;gap:6px;margin-bottom:16px}
.camp-tab{padding:8px 22px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(0,0,0,.15);color:rgba(255,255,255,.3);font-size:14px;font-family:inherit;cursor:pointer;transition:all .2s;font-weight:600}
.camp-tab.active{border-color:rgba(255,215,128,.3);color:#ffd780;background:rgba(255,215,128,.06)}
.camp-tab:hover:not(.active){border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.5)}

.camp-panel{display:none}
.camp-panel.active{display:block}

/* ── Shop / Sell items ── */
.shop-grid{display:grid;gap:6px;max-height:400px;overflow-y:auto;scrollbar-width:thin;padding:4px}
.shop-grid::-webkit-scrollbar{width:4px}
.shop-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.02);transition:all .2s}
.shop-item:hover{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.04)}
.shop-item .si-icon{font-size:24px}
.shop-item .si-info{flex:1;min-width:0}
.shop-item .si-name{font-size:14px;color:#e8ddce;font-weight:600}
.shop-item .si-desc{font-size:11px;color:rgba(255,255,255,.25);margin-top:1px}
.shop-item .si-price{font-size:13px;color:#ffd780;white-space:nowrap}
.shop-item .si-btn{padding:6px 16px;border:1px solid rgba(255,215,128,.2);border-radius:8px;background:rgba(255,215,128,.06);color:#ffd780;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;font-weight:600}
.shop-item .si-btn:hover{background:rgba(255,215,128,.15);border-color:#ffd780}
.shop-item .si-btn:disabled{opacity:.2;cursor:default}
.shop-item .si-qty{font-size:11px;color:rgba(255,255,255,.2)}
.shop-empty{text-align:center;padding:40px 0;color:rgba(255,255,255,.15);font-size:14px}

/* ── Crafting ── */
.craft-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-height:420px;overflow-y:auto;scrollbar-width:thin;padding:4px}
.craft-grid::-webkit-scrollbar{width:4px}
.craft-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
@media(max-width:640px){.craft-grid{grid-template-columns:1fr}}
.craft-card{border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;background:rgba(255,255,255,.02);transition:all .2s}
.craft-card:hover{border-color:rgba(255,255,255,.1)}
.craft-card .cc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.craft-card .cc-icon{font-size:24px}
.craft-card .cc-name{font-size:14px;font-weight:700;color:#e8ddce}
.craft-card .cc-desc{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:8px}
.craft-card .cc-mats{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:8px;line-height:1.6}
.craft-card .cc-mats .have{color:#8aff8a}
.craft-card .cc-mats .need{color:#ff8a8a}
.craft-card .cc-btn{padding:6px 20px;border:1px solid rgba(108,219,108,.2);border-radius:8px;background:rgba(108,219,108,.06);color:#8aff8a;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;font-weight:600}
.craft-card .cc-btn:hover{background:rgba(108,219,108,.15);border-color:#8aff8a}
.craft-card .cc-btn:disabled{opacity:.2;cursor:default}

/* ── Inventory ── */
.inv-section{margin-top:12px;border-top:1px solid rgba(255,255,255,.04);padding-top:12px}
.inv-section .is-title{font-size:12px;color:rgba(255,255,255,.2);margin-bottom:8px;letter-spacing:1px}
.inv-mini{display:flex;flex-wrap:wrap;gap:4px}
.inv-mini .im-item{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);font-size:11px;color:rgba(255,255,255,.4);display:flex;align-items:center;gap:4px}
.inv-mini .im-item .im-qty{color:rgba(255,255,255,.2);font-size:10px}

/* ── Equipment manager ── */
.equip-panel{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.equip-panel{grid-template-columns:1fr}}
.equip-panel .ep-col{border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:14px}
.equip-panel .ep-col .ep-title{font-size:12px;color:rgba(255,255,255,.2);letter-spacing:1px;margin-bottom:8px}
.equip-slot-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;border:1px solid rgba(255,255,255,.04);margin-bottom:4px;transition:all .2s;cursor:pointer}
.equip-slot-row:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.03)}
.equip-slot-row .es-icon{font-size:16px}
.equip-slot-row .es-label{font-size:11px;color:rgba(255,255,255,.2);width:44px}
.equip-slot-row .es-item{flex:1;font-size:12px;color:#8ab8ff;font-weight:600}
.equip-slot-row .es-empty{font-size:11px;color:rgba(255,255,255,.12);flex:1}
.equip-slot-row .es-unequip{font-size:10px;color:rgba(224,108,108,.4);cursor:pointer;opacity:0;transition:opacity .2s}
.equip-slot-row:hover .es-unequip{opacity:1}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#1a1f35;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px 28px;max-width:420px;width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-title{font-size:15px;font-weight:700;color:#ffd780;margin-bottom:12px;text-align:center}
.modal-items{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.modal-item{padding:8px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.02);display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .2s}
.modal-item:hover{border-color:rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.modal-item .mi-icon{font-size:18px}
.modal-item .mi-info{flex:1}
.modal-item .mi-name{font-size:13px;color:#e8ddce}
.modal-item .mi-stats{font-size:10px;color:rgba(255,255,255,.25)}
.modal-cancel{display:block;margin:12px auto 0;padding:8px 28px;border:1px solid rgba(255,255,255,.1);border-radius:10px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s}
.modal-cancel:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7)}
</style>
</head>

</div>

// ─── Render ───
let data = getData();
let tab = 'shop';

function init(){
  const c = data.selectedClass||'warrior', g = data.selectedGender||'male';
  document.getElementById('campAvatar').src = 'images/character/face/'+c+'-'+g+'.png';
  document.getElementById('campName').textContent = (nameMap[c]||'战士')+' '+(genderMap[g]||'♂');
  const ch = data.character||{};
  document.getElementById('campLevel').textContent = ch.level||1;
  document.getElementById('campGold').textContent = ch.gold||0;
  renderShop();
  renderSell();
  renderCraft();
  renderStorage();
}

function switchTab(t){
  tab = t;
  document.querySelectorAll('.camp-tab').forEach(el=>el.classList.remove('active'));
  const tabBtn = document.querySelector('[onclick*="switchTab(\''+t+'\')"]');
  if(tabBtn) tabBtn.classList.add('active');
  document.querySelectorAll('.camp-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}

// ─── 购买 ───
function renderShop(){
  const g = document.getElementById('shopItems');
  g.innerHTML = '';
  const gold = (data.character||{}).gold||0;
  SHOP_CATALOG.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'shop-item';
    const canBuy = gold >= item.buyPrice;
    div.innerHTML = `<span class="si-icon">${item.icon}</span>
      <div class="si-info"><div class="si-name">${item.name}</div>
      <div class="si-desc">${item.desc}</div></div>
      <span class="si-price">${item.buyPrice}💰</span>
      <button class="si-btn"${canBuy?'':' disabled'} onclick="buyItem('${item.id}')">购买</button>`;
    g.appendChild(div);
  });
}

function buyItem(id){
  const catalog = SHOP_CATALOG.find(i=>i.id===id);
  if(!catalog) return;
  const ch = data.character||{};
  if((ch.gold||0) < catalog.buyPrice) return;
  ch.gold = (ch.gold||0) - catalog.buyPrice;
  data.character = ch;
  // 添加到背包
  if(!data.inventory) data.inventory = [];
  const existing = data.inventory.find(i=>i.id===id);
  if(catalog.stats){
    // 装备类只给一个
    if(existing) existing.qty = (existing.qty||1)+1;
    else data.inventory.push({id:catalog.id,name:catalog.name,icon:catalog.icon,desc:catalog.desc,qty:1,sellPrice:catalog.sellPrice||0,slot:catalog.slot,stats:{...catalog.stats}});
  } else {
    if(existing) existing.qty = (existing.qty||1)+1;
    else data.inventory.push({id:catalog.id,name:catalog.name,icon:catalog.icon,desc:catalog.desc,qty:1,sellPrice:catalog.sellPrice||0});
  }
  saveData(data);
  data = getData();
  document.getElementById('campGold').textContent = ch.gold||0;
  renderShop();
  renderSell();
}

// ─── 出售 ───
function renderSell(){
  const g = document.getElementById('sellItems');
  g.innerHTML = '';
  const inv = data.inventory||[];
  if(inv.length === 0){
    g.innerHTML = '<div class="shop-empty">背包空空如也，去打些材料来卖吧</div>';
    return;
  }
  inv.forEach((item,idx)=>{
    const sellPrice = getSellPrice(item);
    if(sellPrice <= 0) return;
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `<span class="si-icon">${item.icon||'📦'}</span>
      <div class="si-info"><div class="si-name">${item.name||'未知'}</div>
      <div class="si-desc">${item.desc||''}</div></div>
      <span class="si-price">${sellPrice}💰</span>
      <span class="si-qty">×${item.qty||1}</span>
      <button class="si-btn" onclick="sellItem(${idx})" style="border-color:rgba(255,215,128,.2);color:#ffd780">出售</button>
      <button class="si-btn" onclick="storeItem(${idx})" style="border-color:rgba(108,160,255,.2);color:#8ab8ff">存入</button>`;
    g.appendChild(div);
  });
}

function getSellPrice(item){
  if(item.sellPrice) return item.sellPrice;
  // 检查商品目录
  const catalog = SHOP_CATALOG.find(i=>i.id===item.id);
  if(catalog && catalog.sellPrice) return catalog.sellPrice;
  return Math.floor((item.buyPrice||0)*0.5) || 1;
}

function sellItem(idx){
  const inv = data.inventory||[];
  const item = inv[idx];
  if(!item) return;
  const price = getSellPrice(item);
  if(price <= 0) return;
  if(!data.character) data.character = {};
  data.character.gold = (data.character.gold||0) + price;
  if((item.qty||1) > 1) item.qty--;
  else inv.splice(idx,1);
  data.inventory = inv;
  saveData(data);
  data = getData();
  document.getElementById('campGold').textContent = data.character.gold||0;
  renderSell();
  renderShop();
  renderCraft();
}

function renderCraft(){

  g.innerHTML = '';
  CRAFT_RECIPES.forEach(recipe=>{
    const canCraft = checkMaterials(recipe.materials);
    const card = document.createElement('div');
    card.className = 'craft-card';
    const matHtml = recipe.materials.map(m => {
      const have = countMaterial(m.id);
      const ok = have >= m.qty;
      return `<span class="${ok?'have':'need'}">${getMatIcon(m.id)} ${m.name} ${have}/${m.qty}</span>`;
    }).join(' + ');
    // 查询物品属性
    const resultId = recipe.result.id;
    const setItem = SET_ITEMS.find(s => s.id === resultId);
    const shopItem = SHOP_CATALOG.find(c => c.id === resultId);
    const itemStats = setItem ? setItem.stats : (shopItem ? shopItem.stats : null);
    let statsHtml = '';
    if (itemStats) {
      const m = {str:'力量',int:'智力',agi:'敏捷',spr:'精神',hp:'生命',mp:'法力'};
      statsHtml = Object.entries(itemStats).map(([k,v]) =>
        `<span style="color:#8ab8ff;font-size:11px">${m[k]||k} +${v}</span>`
      ).join('  ');
      statsHtml = '<div style="margin:4px 0 6px">' + statsHtml + '</div>';
    }
    card.innerHTML = `
      <div class="cc-header">
        <span class="cc-icon">${recipe.icon}</span>
        <span class="cc-name">${recipe.name}</span>
        <span style="font-size:11px;color:rgba(255,255,255,.2);margin-left:auto">×${recipe.result.qty}</span>
      </div>
      <div class="cc-desc">${recipe.desc}</div>
      ${statsHtml}
      <div class="cc-mats">所需材料：${matHtml}</div>
      <button class="cc-btn"${canCraft?'':' disabled'} onclick="craftItem('${recipe.id}')">🔨 制作</button>`;
    g.appendChild(card);
  });
  // 套装效果预览
  const SET_DISPLAY = [
    {setId:'warrior_set',icon:'⚔️',name:'战神套 · 战士',tiers:[{n:2,e:'力量 +15'},{n:4,e:'最大生命 +80'},{n:6,e:'防御后反击 50% 伤害'},{n:8,e:'每击败一怪攻击力 +3（本场）'}]},
    {setId:'mage_set',icon:'🔮',name:'大魔导套 · 法师',tiers:[{n:2,e:'智力 +15'},{n:4,e:'最大法力 +60'},{n:6,e:'技能伤害 +20%'},{n:8,e:'每击败一怪回复 10 MP'}]},
    {setId:'priest_set',icon:'✨',name:'大主教套 · 牧师',tiers:[{n:2,e:'精神 +15'},{n:4,e:'治疗效果 +10%'},{n:6,e:'每 3 回合清除负面效果'},{n:8,e:'每场战斗复活一次'}]},
    {setId:'archer_set',icon:'🏹',name:'神射手套 · 弓箭手',tiers:[{n:2,e:'敏捷 +15'},{n:4,e:'暴击率 +10%'},{n:6,e:'暴击伤害 \u00d71.5'},{n:8,e:'每次击杀后回复 15% 最大 HP'}]}
  ];
  SET_DISPLAY.forEach(sd => {
    const infoCard = document.createElement('div');
    infoCard.className = 'craft-card';
    infoCard.style.gridColumn = '1 / -1';
    infoCard.style.borderColor = 'rgba(255,215,128,.2)';
    infoCard.style.background = 'rgba(255,215,128,.03)';
    const tierHtml = sd.tiers.map(t => '<div style="font-size:11px;color:rgba(255,215,128,.7);margin-bottom:2px">'+t.n+'件套：'+t.e+'</div>').join('');

    g.appendChild(infoCard);

function countMaterial(id){
  const inv = data.inventory||[];
  let total = 0;
  inv.forEach(i=>{ if(i.id === id) total += (i.qty||1); });
  // 如果是基础材料，玩家可能没有，都是打怪掉落
  return total;
}

function checkMaterials(mats){
  for(const m of mats){
    if(countMaterial(m.id) < m.qty) return false;
  }
  return true;
}

function consumeMaterials(mats){
  const inv = data.inventory||[];
  for(const m of mats){
    let remaining = m.qty;
    for(let i = inv.length-1; i >= 0 && remaining > 0; i--){
      if(inv[i].id === m.id){
        if(inv[i].qty > remaining){
          inv[i].qty -= remaining;
          remaining = 0;
        } else {
          remaining -= (inv[i].qty||1);
          inv.splice(i, 1);
        }
      }
    }
  }
  data.inventory = inv;
}

function craftItem(recipeId){
  const recipe = CRAFT_RECIPES.find(r=>r.id===recipeId);
  if(!recipe || !checkMaterials(recipe.materials)) return;
  consumeMaterials(recipe.materials);
  // 添加产物
  const result = recipe.result;
  const existing = data.inventory.find(i=>i.id===result.id);
  // 套装装备
  const setItem = SET_ITEMS.find(s=>s.id===result.id);
  if(setItem){
    if(existing) existing.qty=(existing.qty||1)+result.qty;
    else data.inventory.push({id:setItem.id,name:setItem.name,icon:setItem.icon,desc:setItem.desc,
      qty:result.qty,sellPrice:setItem.sellPrice||0,slot:setItem.slot,stats:{...setItem.stats},setId:setItem.setId});
  } else if(result.id.startsWith('camp_') && SHOP_CATALOG.find(c=>c.id===result.id && c.stats)){
    // 普通装备类
    const cat = SHOP_CATALOG.find(c=>c.id===result.id);
    if(existing) existing.qty = (existing.qty||1)+result.qty;
    else data.inventory.push({id:cat.id,name:cat.name,icon:cat.icon,desc:cat.desc,
      qty:result.qty,sellPrice:cat.sellPrice||0,slot:cat.slot,stats:{...cat.stats}});
  } else {
    if(existing) existing.qty = (existing.qty||1)+result.qty;
    else {
      const cat = SHOP_CATALOG.find(c=>c.id===result.id);
      data.inventory.push({id:result.id,name:cat?cat.name:result.id,icon:cat?cat.icon:'📦',
        desc:cat?cat.desc:'',qty:result.qty,sellPrice:cat?cat.sellPrice:0});
    }
  }
  // 保存基础材料存档（首次使用自动添加材料到背包模拟）
  saveData(data);
  data = getData();
  renderCraft();
  renderSell();
  document.getElementById('campGold').textContent = (data.character||{}).gold||0;
}

// ─── 仓库管理 ───
function renderStorage(){
  const g = document.getElementById('storageItems');
  g.innerHTML = '';
  const storage = data.storage||[];
  if(storage.length === 0){
    g.innerHTML = '<div class="shop-empty">仓库是空的，去背包里存些东西吧</div>';
    return;
  }
  storage.forEach((item,idx)=>{
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `<span class="si-icon">${item.icon||'📦'}</span>
      <div class="si-info"><div class="si-name">${item.name||'未知'}</div>
      <div class="si-desc">${item.desc||''}</div></div>
      <span class="si-qty">×${item.qty||1}</span>
      <button class="si-btn" onclick="withdrawItem(${idx})" style="border-color:rgba(108,219,108,.3);color:#8aff8a">取出</button>`;
    g.appendChild(div);
  });
}

function storeItem(invIdx){
  const inv = data.inventory||[];
  const item = inv[invIdx];
  if(!item) return;
  if(!data.storage) data.storage = [];
  const qtyToStore = item.qty || 1;
  if(qtyToStore > 1) item.qty--;
  else inv.splice(invIdx, 1);
  data.inventory = inv;
  const existing = data.storage.find(s => s.id === item.id);
  if(existing) existing.qty = (existing.qty||1) + 1;
  else data.storage.push({id:item.id, name:item.name, icon:item.icon, desc:item.desc, qty:1, sellPrice:item.sellPrice||0, slot:item.slot, stats:item.stats ? {...item.stats} : undefined});
  saveData(data);
  data = getData();
  renderSell();
  renderStorage();
}

function withdrawItem(storageIdx){
  const storage = data.storage||[];
  const item = storage[storageIdx];
  if(!item) return;
  if(!data.inventory) data.inventory = [];
  const qtyToTake = item.qty || 1;
  if(qtyToTake > 1) item.qty--;
  else storage.splice(storageIdx, 1);
  data.storage = storage;
  const existing = data.inventory.find(i => i.id === item.id);
  if(existing) existing.qty = (existing.qty||1) + 1;
  else data.inventory.push({id:item.id, name:item.name, icon:item.icon, desc:item.desc, qty:1, sellPrice:item.sellPrice||0, slot:item.slot, stats:item.stats ? {...item.stats} : undefined});
  saveData(data);
  data = getData();
  renderStorage();
  renderSell();
}

init();
</script>
